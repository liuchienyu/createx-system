{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:820px;margin:18px auto">
  <div class="row" style="justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
    <div>
      <div class="muted" style="font-size:12px">Error</div>
      <h1 style="margin:6px 0 0 0">403｜沒有權限</h1>
      <p class="muted" style="margin:10px 0 0 0;line-height:1.7">
        你目前沒有權限瀏覽此頁面。<br>
        若你需要存取，請聯絡管理員替你開通對應的角色或權限。
      </p>
    </div>

    <div style="min-width:220px">
      <div class="muted" style="font-size:12px;margin-bottom:8px">建議操作</div>

      <div class="row gap" style="flex-wrap:wrap">
        <a class="btn" href="{{ url_for('dashboard.index') }}">回 Dashboard</a>
        <button class="btn ghost" onclick="history.back()">回上一頁</button>
        <a class="btn danger" href="{{ url_for('logout') }}">登出</a>
      </div>

      <div class="muted" style="font-size:12px;margin-top:10px">
        若你是新帳號，可能需要管理員指派角色後才會有權限。
      </div>
    </div>
  </div>
</div>
{% endblock %}
