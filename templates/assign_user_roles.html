{% extends "base.html" %}

{% block title %}指派角色 - Createx{% endblock %}
{% block page_title %}指派角色{% endblock %}
{% block page_subtitle %}設定使用者可擁有的角色{% endblock %}

{% block content %}
<div class="card">
    <h3>對象：{{ target_user.display_name or target_user.username }}</h3>

    <form method="post">
        {% for role in all_roles %}
            <div style="margin-bottom: 10px;">
                <label style="font-weight: normal;">
                    <input
                        type="checkbox"
                        name="role_ids"
                        value="{{ role.id }}"
                        {% if role.id in current_role_ids %}checked{% endif %}
                    >
                    {{ role.name }} - {{ role.description }}
                </label>
            </div>
        {% endfor %}

        <button type="submit">儲存</button>
    </form>
</div>
{% endblock %}
