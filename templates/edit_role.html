{% extends "base.html" %}

{% block title %}編輯角色 - Createx{% endblock %}
{% block page_title %}編輯角色{% endblock %}
{% block page_subtitle %}調整角色名稱、說明與權限{% endblock %}

{% block content %}
<div class="card" style="max-width: 760px;">
    <form method="post">
        <label>角色名稱</label>
        <input type="text" name="name" value="{{ role.name }}" required>

        <label>角色說明</label>
        <textarea name="description" rows="3">{{ role.description or '' }}</textarea>

        <label>權限設定</label>
        <div style="border: 1px solid #d1d5db; border-radius: 10px; padding: 12px; margin-bottom: 16px;">
            {% for permission in permissions %}
                <div style="margin-bottom: 8px;">
                    <label style="font-weight: normal;">
                        <input
                            type="checkbox"
                            name="permission_ids"
                            value="{{ permission.id }}"
                            {% if permission.id in current_permission_ids %}checked{% endif %}
                        >
                        {{ permission.code }} - {{ permission.description }}
                    </label>
                </div>
            {% endfor %}
        </div>

        <button type="submit">儲存變更</button>
    </form>
</div>
{% endblock %}
