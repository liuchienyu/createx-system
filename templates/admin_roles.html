<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>角色管理 - Createx</title>
</head>
<body>
    <h1>角色管理</h1>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>角色名稱</th>
                <th>說明</th>
                <th>權限數量</th>
            </tr>
        </thead>
        <tbody>
            {% for r in roles %}
            <tr>
                <td>{{ r.id }}</td>
                <td>{{ r.name }}</td>
                <td>{{ r.description }}</td>
                <td>{{ r.permission_count }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <p><a href="{{ url_for('home') }}">回首頁</a></p>
</body>
</html>
