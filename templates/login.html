{% extends "base.html" %}

{% block title %}登入 - Createx{% endblock %}
{% block page_title %}登入{% endblock %}
{% block page_subtitle %}請輸入帳號密碼登入系統{% endblock %}

{% block content %}
<div class="card" style="max-width: 480px;">
    <form method="post">
        <div>
            <label>帳號</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>密碼</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">登入</button>
    </form>
</div>
{% endblock %}
