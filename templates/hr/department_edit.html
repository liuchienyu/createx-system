{% extends "base.html" %}

{% block title %}編輯部門 - Createx{% endblock %}
{% block page_title %}編輯部門{% endblock %}
{% block page_subtitle %}修改部門資料與上下層關係{% endblock %}

{% block content %}
<div class="card" style="max-width:760px;">
    <form method="post">
        <label>部門名稱</label>
        <input type="text" name="name" value="{{ department.name }}" required>

        <label>上層部門</label>
        <select name="parent_id">
            <option value="">無</option>
            {% for d in parent_departments %}
                <option value="{{ d.id }}" {% if department.parent_id == d.id %}selected{% endif %}>{{ d.name }}</option>
            {% endfor %}
        </select>

        <label>排序</label>
        <input type="number" name="sort_order" value="{{ department.sort_order }}">

        <div style="margin:12px 0 18px;">
            <label style="font-weight:normal;">
                <input type="checkbox" name="is_active" {% if department.is_active %}checked{% endif %}>
                啟用部門
            </label>
        </div>

        <button type="submit">儲存變更</button>
    </form>
</div>
{% endblock %}
