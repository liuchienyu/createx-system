{% extends "base.html" %}

{% block title %}重設密碼 - Createx{% endblock %}
{% block page_title %}重設密碼{% endblock %}
{% block page_subtitle %}為使用者設定新的登入密碼{% endblock %}

{% block content %}
<div class="card" style="max-width: 720px;">
    <h3>對象：{{ target_user.display_name or target_user.username }}</h3>

    <form method="post">
        <label>新密碼</label>
        <input type="password" name="new_password" required>

        <button type="submit">更新密碼</button>
    </form>
</div>
{% endblock %}
