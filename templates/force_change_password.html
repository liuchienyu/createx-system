{% extends "base.html" %}
{% block content %}
<h1>請先更新密碼</h1>

<div class="card">
  <p class="muted">基於安全性，你目前需要先更改密碼後才能繼續使用系統。</p>

  <form method="post" class="form">
    <label>新密碼（至少 8 碼）</label>
    <input name="password1" type="password" required>

    <label>再輸入一次</label>
    <input name="password2" type="password" required>

    <div class="row">
      <button class="btn" type="submit">更新密碼</button>
      <a class="btn ghost" href="{{ url_for('logout') }}">登出</a>
    </div>
  </form>
</div>
{% endblock %}
